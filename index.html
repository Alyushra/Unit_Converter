<!DOCTYPE html>
<html>
<head>
<title>Advanced Unit Converter</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
margin:0;
text-align:center;
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
}
header{
padding:20px;
background:#111;
}
header h1{
font-family: "Lucida Console", "Courier New", monospace;
font-size:36px;
letter-spacing:4px;
color:#00eaff;
text-shadow:2px 2px 8px #00eaff;
}
nav{
background:#1b1b1b;
padding:10px;
}
.tab{
border:none;
padding:10px 15px;
margin:5px;
background:transparent;
color:white;
font-weight:bold;
cursor:pointer;
}
.tab.active{
background:#00eaff;
color:black;
border-radius:20px;
}
.container{
background:#1e2a38;
width:350px;
margin:60px auto;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,255,0.4);
}
h2{
font-family: "Lucida Console", "Courier New", monospace;    
color:#00eaff;
}
input,select{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#0f1720;
color:white;
}
button{
font-family: Georgia, "Times New Roman", serif;
padding:10px 20px;
border:none;
background:#00eaff;
color:black;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
button:hover{
background:#00bcd4;
}
</style>
</head>

<body>
<header>
<h1>∑ Unit Converter</h1>
</header>

<nav id="tabs"></nav>

<div class="container">

<h2 id="title">Length Converter</h2>

<input type="number" id="inputValue" placeholder="Enter value">

<select id="fromUnit"></select>

<select id="toUnit"></select>

<input type="text" id="result" placeholder="Result" readonly>

<button onclick="convert()">Convert</button>

</div>

<script>

let units={

Length:{
meter:1,
kilometer:1000,
centimeter:0.01,
millimeter:0.001
},
Weight:{
gram:1,
kilogram:1000,
milligram:0.001,
pound:453.592
},
Temperature:{
celsius:"c",
fahrenheit:"f",
kelvin:"k"
},
Area:{
sqm:1,
sqkm:1000000,
sqcm:0.0001,
hectare:10000
},
Volume:{
liter:1,
milliliter:0.001,
cubicmeter:1000
},
Speed:{
mps:1,
kmph:0.277778,
mph:0.44704
},
Time:{
second:1,
minute:60,
hour:3600
},
Pressure:{
pascal:1,
bar:100000,
atm:101325
},
Energy:{
joule:1,
kilojoule:1000,
calorie:4.184
},
Data:{
byte:1,
kilobyte:1024,
megabyte:1048576,
gigabyte:1073741824
}
}

let tabs=document.getElementById("tabs")

for(let key in units){
let btn=document.createElement("button")
btn.innerText=key
btn.className="tab"
btn.onclick=()=>selectCategory(key,btn)
tabs.appendChild(btn)
}

function selectCategory(category,button){

document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"))
button.classList.add("active")

document.getElementById("title").innerText=category+" Converter"

let from=document.getElementById("fromUnit")
let to=document.getElementById("toUnit")

from.innerHTML=""
to.innerHTML=""

for(let unit in units[category]){
let option1=document.createElement("option")
option1.value=unit
option1.text=unit
from.appendChild(option1)

let option2=document.createElement("option")
option2.value=unit
option2.text=unit
to.appendChild(option2)
}

currentCategory=category
}

let currentCategory="Length"
selectCategory("Length",document.querySelector(".tab"))

function convert(){

let value=parseFloat(document.getElementById("inputValue").value)
let from=document.getElementById("fromUnit").value
let to=document.getElementById("toUnit").value

let result

if(currentCategory==="Temperature"){

if(from==="celsius" && to==="fahrenheit") result=value*9/5+32
else if(from==="fahrenheit" && to==="celsius") result=(value-32)*5/9
else if(from==="celsius" && to==="kelvin") result=value+273.15
else if(from==="kelvin" && to==="celsius") result=value-273.15
else if(from==="fahrenheit" && to==="kelvin") result=(value-32)*5/9+273.15
else if(from==="kelvin" && to==="fahrenheit") result=(value-273.15)*9/5+32
else result=value

}else{

let base=value*units[currentCategory][from]
result=base/units[currentCategory][to]

}

document.getElementById("result").value=value+" "+from+" = "+result+" "+to

}

</script>

</body>
</html>
